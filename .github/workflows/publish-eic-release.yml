name: Publish EIC Release

on:
  repository_dispatch:
    types:
      - eic-version-pushed
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref in snowberried/EIC to build
        required: true
        default: master
      prerelease:
        description: Mark the GitHub Release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: publish-eic-release
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: snowberried/EIC
  SOURCE_REF: ${{ github.event.client_payload.source_sha || inputs.source_ref || 'master' }}
  HAS_SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN != '' }}
  HAS_NEMC_EMERGENCY_API_KEY: ${{ secrets.NEMC_EMERGENCY_API_KEY != '' }}
  HAS_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
  HAS_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' }}

jobs:
  build-windows:
    name: Build and publish Windows updater assets
    runs-on: windows-latest

    steps:
      - name: Validate required secrets
        shell: pwsh
        run: |
          $missing = @()
          if ($env:HAS_SOURCE_REPO_TOKEN -ne 'true') {
            $missing += 'SOURCE_REPO_TOKEN'
          }
          if ($env:HAS_NEMC_EMERGENCY_API_KEY -ne 'true') {
            $missing += 'NEMC_EMERGENCY_API_KEY'
          }
          if ($env:HAS_TAURI_SIGNING_PRIVATE_KEY -ne 'true') {
            $missing += 'TAURI_SIGNING_PRIVATE_KEY'
          }
          if ($env:HAS_TAURI_SIGNING_PRIVATE_KEY_PASSWORD -ne 'true') {
            $missing += 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD'
          }
          if ($missing.Count -gt 0) {
            $message = 'Missing required repository secrets: ' + ($missing -join ', ')
            Write-Error $message
            exit 1
          }

      - name: Checkout release automation
        uses: actions/checkout@v4

      - name: Checkout EIC source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          path: EIC
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Fetch all EIC source branches
        shell: pwsh
        working-directory: EIC
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Check whether a newer version should be published
        id: release-check
        shell: pwsh
        working-directory: EIC
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $latestTag = gh release view --repo snowberried/EIC-releases --json tagName --jq '.tagName'
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($latestTag)) {
            throw 'Could not read the latest EIC release version.'
          }
          $latestVersion = $latestTag.Trim().TrimStart('v')

          $selector = Join-Path $env:GITHUB_WORKSPACE '.github/scripts/select-eic-release-source.ps1'
          $selectorArgs = @{
            SourceDirectory = (Get-Location).Path
            LatestVersion = $latestVersion
          }
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $selectorArgs.RequestedRef = 'HEAD'
            $selectorArgs.ForcePublish = $true
          } elseif ('${{ github.event_name }}' -eq 'repository_dispatch') {
            $selectorArgs.RequestedRef = 'HEAD'
          }

          & $selector @selectorArgs

      - name: Checkout selected EIC release commit
        if: steps.release-check.outputs.should_publish == 'true'
        shell: pwsh
        working-directory: EIC
        run: git checkout --detach '${{ steps.release-check.outputs.source_sha }}'

      - name: Validate user-facing release notes
        if: steps.release-check.outputs.should_publish == 'true'
        shell: pwsh
        working-directory: EIC
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -LiteralPath 'release-notes.json')) {
            throw 'release-notes.json is required for a public release.'
          }

          $releaseNotes = Get-Content -Raw -Encoding UTF8 -LiteralPath 'release-notes.json' | ConvertFrom-Json
          if ([string]$releaseNotes.version -ne '${{ steps.release-check.outputs.app_version }}') {
            throw "release-notes.json version $($releaseNotes.version) does not match app version ${{ steps.release-check.outputs.app_version }}."
          }

          $items = @($releaseNotes.items | ForEach-Object { ([string]$_).Trim() } | Where-Object { $_ })
          if ($items.Count -eq 0) {
            throw 'release-notes.json must contain at least one update item.'
          }

      - name: Setup Node.js
        if: steps.release-check.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: EIC/package-lock.json

      - name: Setup Rust
        if: steps.release-check.outputs.should_publish == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        if: steps.release-check.outputs.should_publish == 'true'
        working-directory: EIC
        run: npm ci

      - name: Typecheck frontend
        if: steps.release-check.outputs.should_publish == 'true'
        working-directory: EIC
        run: npm run typecheck

      - name: Build signed Tauri updater artifacts
        if: steps.release-check.outputs.should_publish == 'true'
        working-directory: EIC
        env:
          NEMC_EMERGENCY_API_KEY: ${{ secrets.NEMC_EMERGENCY_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build

      - name: Prepare GitHub Release assets
        if: steps.release-check.outputs.should_publish == 'true'
        shell: pwsh
        working-directory: EIC
        env:
          SELECTED_SOURCE_REF: ${{ steps.release-check.outputs.source_ref }}
          SELECTED_SOURCE_SHA: ${{ steps.release-check.outputs.source_sha }}
        run: |
          $ErrorActionPreference = 'Stop'

          $config = Get-Content -Raw -Encoding UTF8 -LiteralPath 'src-tauri/tauri.conf.json' | ConvertFrom-Json
          $version = [string]$config.version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'src-tauri/tauri.conf.json does not contain a version.'
          }

          $releaseNotes = Get-Content -Raw -Encoding UTF8 -LiteralPath 'release-notes.json' | ConvertFrom-Json
          $releaseItems = @($releaseNotes.items | ForEach-Object { ([string]$_).Trim() } | Where-Object { $_ })
          $releaseNotesText = ($releaseItems | ForEach-Object { "- $_" }) -join "`n"

          $bundleDir = (Resolve-Path 'src-tauri/target/release/bundle/nsis').Path
          $setup = Get-ChildItem -LiteralPath $bundleDir -File -Filter '*setup.exe' |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          $updater = Get-ChildItem -LiteralPath $bundleDir -File -Filter '*.nsis.zip' |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          $signatureFile = Get-ChildItem -LiteralPath $bundleDir -File -Filter '*.nsis.zip.sig' |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if ($null -eq $setup) {
            throw 'Windows NSIS setup exe was not generated.'
          }
          if ($null -eq $updater) {
            throw 'Tauri updater bundle (*.nsis.zip) was not generated.'
          }
          if ($null -eq $signatureFile) {
            throw 'Tauri updater signature (*.nsis.zip.sig) was not generated.'
          }

          $assetsDir = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          $setupAssetName = "EIC_$($version)_x64-setup.exe"
          $updaterAssetName = "EIC_$($version)_x64-setup.nsis.zip"
          $signatureAssetName = "$updaterAssetName.sig"

          Copy-Item -LiteralPath $setup.FullName -Destination (Join-Path $assetsDir $setupAssetName)
          Copy-Item -LiteralPath $updater.FullName -Destination (Join-Path $assetsDir $updaterAssetName)
          Copy-Item -LiteralPath $signatureFile.FullName -Destination (Join-Path $assetsDir $signatureAssetName)

          $tag = "v$version"
          $signature = (Get-Content -Raw -Encoding UTF8 -LiteralPath $signatureFile.FullName).Trim()
          $updaterUrl = "https://github.com/snowberried/EIC-releases/releases/download/$tag/$updaterAssetName"
          $pubDate = [DateTimeOffset]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')

          $latestJson = [ordered]@{
            version = $version
            notes = $releaseNotesText
            pub_date = $pubDate
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url = $updaterUrl
              }
            }
          }

          $latestJson |
            ConvertTo-Json -Depth 10 |
            Set-Content -Encoding UTF8 -LiteralPath (Join-Path $assetsDir 'latest.json')

          @(
            "EIC $version"
            ''
            '## 업데이트 내용'
            ''
            $releaseNotesText
            ''
            "Source repository: snowberried/EIC"
            "Source ref: $env:SELECTED_SOURCE_REF"
            "Source commit: $env:SELECTED_SOURCE_SHA"
            'Updater endpoint: https://github.com/snowberried/EIC-releases/releases/latest/download/latest.json'
          ) -join "`n" |
            Set-Content -Encoding UTF8 -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'release-body.md')

          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Publish GitHub Release
        if: steps.release-check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: EIC ${{ env.APP_VERSION }}
          body_path: release-body.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          make_latest: true
          overwrite_files: true
          files: release-assets/*
